name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phase-4-host-c:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            host_cc: gcc
          - os: windows-latest
            host_cc: clang
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install native LLVM on Windows
        if: runner.os == 'Windows'
        run: choco install llvm --yes --no-progress
      - name: Run phase 4 host-C behavior and mutation tests
        env:
          HOST_CC: ${{ matrix.host_cc }}
        run: npx vitest run --config web/vitest.config.ts scripts/firmware-host/phase-04-host.test.ts

  phase-5-host-c:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run --config web/vitest.config.ts scripts/content-validation/phase-05-content.test.ts --testTimeout=15000

  web-and-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run test:ci
      - name: Run device protocol host-C contract
        env:
          HOST_CC: gcc
        run: npx vitest run --config web/vitest.config.ts scripts/firmware/device-test-firmware.test.ts
      - run: npm run typecheck
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Verify production offline journey
        env:
          E2E_PREVIEW: 1
        run: npm run test:e2e -- web/e2e/offline.spec.ts
